name: Deploy Next.js and Python to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10 # or whatever version you're using locally

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Node dependencies
        run: pnpm install
        working-directory: ./

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python_txt_file/requirements.txt
          pip install flake8 pytest
        working-directory: ./

      - name: Lint Python code with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 python/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 python/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        working-directory: ./

      - name: Test Python code
        run: |
          # Run Python tests if they exist
          if [ -d "python/tests" ]; then
            pytest python/tests -v
          else
            echo "No Python tests found, skipping..."
          fi
        working-directory: ./

      - name: Checking ESLint with Next.js
        run: pnpm run lint
        working-directory: ./

      - name: Build with Next.js
        run: pnpm run build
        working-directory: ./
        env:
          # Secrets
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          APP_URL: ${{ vars.APP_URL }}
          
          # Public variables
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Check Python application
        run: |
          echo "Checking Python application..."
          python --version
          echo "Python dependencies installed successfully"
        working-directory: ./
          